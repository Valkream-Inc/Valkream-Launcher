<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="./images/icon/icon.ico" />
    <link rel="apple-touch-icon" href="./images/icon/icon.icns" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Valkream Launcher</title>

    <!-- Manifest + Meta -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Launcher Valheim moddé pour Valkream" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'wasm-unsafe-eval' blob:;
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https://gcdn.thunderstore.io;
        font-src 'self';
        connect-src 'self' blob:;
        media-src 'self' blob:;
      "
    />

    <!-- Css -->
    <link rel="stylesheet" href="./css/index.css" />

    <!-- Images -->
    <link rel="preload" href="./images/SevenDtoD-background.png" as="image" />
    <link rel="preload" href="./images/SevenDtoD-loader.png" as="image" />
    <link
      rel="preload"
      href="./images/SevenDtoD-icon-with-name.png"
      as="image"
    />
    <link rel="preload" href="./images/SevenDtoD-icon.png" as="image" />

    <link rel="preload" href="./images/Valheim-background.png" as="image" />
    <link rel="preload" href="./images/Valheim-loader.png" as="image" />
    <link rel="preload" href="./images/Valheim-icon-with-name.png" as="image" />
    <link rel="preload" href="./images/Valheim-icon.png" as="image" />
  </head>
  <body>
    <noscript>
      Vous devez activer JavaScript pour utiliser cette app.
    </noscript>
    <div id="root"></div>
    <!-- React va injecter ses bundles ici -->
    <script type="module" src="./index.jsx"></script>
  </body>
</html>
